<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Web → ML Concept Tutor</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c10;
    --surface: #12151c;
    --surface2: #1a1e28;
    --surface3: #222836;
    --border: #2a3040;
    --text: #e2e8f0;
    --text-dim: #8892a8;
    --accent: #6ee7b7;
    --accent2: #34d399;
    --accent-glow: rgba(110, 231, 183, 0.15);
    --warm: #fbbf24;
    --warm-glow: rgba(251, 191, 36, 0.15);
    --coral: #fb7185;
    --coral-glow: rgba(251, 113, 133, 0.15);
    --blue: #60a5fa;
    --blue-glow: rgba(96, 165, 250, 0.15);
    --purple: #a78bfa;
    --purple-glow: rgba(167, 139, 250, 0.15);
    --cyan: #22d3ee;
    --cyan-glow: rgba(34, 211, 238, 0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  .grain {
    position: fixed; inset: 0; z-index: 9999; pointer-events: none; opacity: 0.03;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  }

  /* NAV */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    background: rgba(10, 12, 16, 0.85); backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 24px; height: 60px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .nav-brand {
    font-family: 'JetBrains Mono', monospace; font-weight: 700;
    font-size: 14px; color: var(--accent); letter-spacing: 1px;
  }
  .nav-brand span { color: var(--text-dim); }
  .nav-progress {
    display: flex; gap: 6px; align-items: center;
  }
  .nav-dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--surface3); border: 1.5px solid var(--border);
    cursor: pointer; transition: all 0.3s;
  }
  .nav-dot.active { background: var(--accent); border-color: var(--accent); box-shadow: 0 0 8px var(--accent-glow); }
  .nav-dot.completed { background: var(--accent2); border-color: var(--accent2); opacity: 0.6; }
  .nav-score {
    font-family: 'JetBrains Mono', monospace; font-size: 13px;
    color: var(--warm); background: var(--warm-glow);
    padding: 4px 12px; border-radius: 20px;
  }

  /* MAIN */
  main { padding-top: 80px; max-width: 960px; margin: 0 auto; padding-left: 20px; padding-right: 20px; padding-bottom: 80px; }

  /* HERO */
  .hero {
    text-align: center; padding: 60px 0 40px;
    animation: fadeUp 0.8s ease;
  }
  .hero h1 {
    font-family: 'Playfair Display', serif; font-weight: 900;
    font-size: clamp(32px, 5vw, 52px); line-height: 1.15;
    background: linear-gradient(135deg, var(--accent), var(--cyan), var(--blue));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    margin-bottom: 16px;
  }
  .hero p { color: var(--text-dim); font-size: 17px; max-width: 600px; margin: 0 auto 32px; line-height: 1.7; }
  .hero-start {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--accent); color: var(--bg); font-weight: 700;
    padding: 14px 32px; border-radius: 12px; border: none;
    cursor: pointer; font-size: 16px; font-family: inherit;
    transition: all 0.3s; box-shadow: 0 4px 20px var(--accent-glow);
  }
  .hero-start:hover { transform: translateY(-2px); box-shadow: 0 8px 30px var(--accent-glow); }

  /* SECTIONS */
  .section { display: none; animation: fadeUp 0.5s ease; }
  .section.active { display: block; }

  .section-header {
    display: flex; align-items: center; gap: 16px; margin-bottom: 32px;
    padding-bottom: 20px; border-bottom: 1px solid var(--border);
  }
  .section-num {
    font-family: 'JetBrains Mono', monospace; font-size: 13px;
    color: var(--bg); background: var(--accent); width: 36px; height: 36px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 10px; font-weight: 700; flex-shrink: 0;
  }
  .section-title { font-family: 'Playfair Display', serif; font-size: 28px; font-weight: 700; }
  .section-subtitle { font-size: 14px; color: var(--text-dim); margin-top: 2px; }

  /* CONTENT CARDS */
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 28px; margin-bottom: 20px;
    transition: border-color 0.3s;
  }
  .card:hover { border-color: var(--surface3); }
  .card h3 {
    font-family: 'JetBrains Mono', monospace; font-size: 14px;
    text-transform: uppercase; letter-spacing: 1.5px;
    margin-bottom: 14px; display: flex; align-items: center; gap: 8px;
  }
  .card p, .card li { font-size: 15px; line-height: 1.8; color: var(--text-dim); }
  .card p + p { margin-top: 12px; }
  .card ul { padding-left: 20px; margin-top: 8px; }
  .card li { margin-bottom: 6px; }
  .card strong { color: var(--text); }

  .tag-web { color: var(--accent); }
  .tag-ml { color: var(--warm); }
  .tag-both { color: var(--purple); }

  /* ANALOGY BOX */
  .analogy {
    background: linear-gradient(135deg, var(--accent-glow), var(--warm-glow));
    border: 1px solid rgba(110, 231, 183, 0.2);
    border-radius: 14px; padding: 24px; margin: 20px 0;
    position: relative; overflow: hidden;
  }
  .analogy::before {
    content: '⟷'; position: absolute; top: 12px; right: 16px;
    font-size: 20px; opacity: 0.4;
  }
  .analogy h4 { font-size: 13px; font-family: 'JetBrains Mono', monospace; color: var(--accent); margin-bottom: 10px; letter-spacing: 1px; }
  .analogy p { font-size: 15px; line-height: 1.7; }

  /* DIAGRAM */
  .diagram-box {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 14px; padding: 24px; margin: 20px 0;
    font-family: 'JetBrains Mono', monospace; font-size: 13px;
    line-height: 2; color: var(--text-dim); overflow-x: auto;
    white-space: pre;
  }
  .diagram-box .hl-accent { color: var(--accent); }
  .diagram-box .hl-warm { color: var(--warm); }
  .diagram-box .hl-coral { color: var(--coral); }
  .diagram-box .hl-blue { color: var(--blue); }
  .diagram-box .hl-purple { color: var(--purple); }
  .diagram-box .hl-cyan { color: var(--cyan); }

  /* CODE BLOCK */
  .code-block {
    background: #0d1117; border: 1px solid var(--border);
    border-radius: 12px; padding: 20px; margin: 16px 0;
    font-family: 'JetBrains Mono', monospace; font-size: 13px;
    line-height: 1.8; overflow-x: auto; color: #c9d1d9;
  }
  .code-block .comment { color: #6e7681; }
  .code-block .keyword { color: #ff7b72; }
  .code-block .string { color: #a5d6ff; }
  .code-block .fn { color: #d2a8ff; }
  .code-block .type { color: #79c0ff; }

  /* INTERACTIVE: WHAT-IF */
  .whatif-container {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 28px; margin: 24px 0;
  }
  .whatif-container h3 {
    font-family: 'JetBrains Mono', monospace; font-size: 14px;
    color: var(--cyan); margin-bottom: 16px; letter-spacing: 1px;
  }
  .whatif-scenario { margin-bottom: 20px; }
  .whatif-scenario p { font-size: 15px; line-height: 1.7; color: var(--text-dim); margin-bottom: 12px; }
  .whatif-options { display: flex; flex-direction: column; gap: 10px; }
  .whatif-btn {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px 18px; cursor: pointer;
    font-size: 14px; color: var(--text); font-family: inherit;
    text-align: left; transition: all 0.3s; line-height: 1.5;
  }
  .whatif-btn:hover { border-color: var(--cyan); background: var(--cyan-glow); }
  .whatif-btn.selected { border-color: var(--cyan); background: var(--cyan-glow); }
  .whatif-btn.correct { border-color: var(--accent); background: var(--accent-glow); }
  .whatif-btn.wrong { border-color: var(--coral); background: var(--coral-glow); }
  .whatif-explanation {
    margin-top: 14px; padding: 16px; border-radius: 10px;
    background: var(--surface2); font-size: 14px; line-height: 1.7;
    color: var(--text-dim); display: none;
  }
  .whatif-explanation.show { display: block; animation: fadeUp 0.3s ease; }

  /* QUIZ */
  .quiz-container {
    background: var(--surface); border: 2px solid var(--border);
    border-radius: 16px; padding: 28px; margin: 28px 0;
  }
  .quiz-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 20px;
  }
  .quiz-header h3 {
    font-family: 'JetBrains Mono', monospace; font-size: 14px;
    color: var(--warm); letter-spacing: 1px;
  }
  .quiz-counter { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: var(--text-dim); }
  .quiz-question { font-size: 16px; line-height: 1.7; margin-bottom: 18px; }
  .quiz-options { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
  .quiz-opt {
    background: var(--surface2); border: 1.5px solid var(--border);
    border-radius: 10px; padding: 14px 18px; cursor: pointer;
    font-size: 14px; color: var(--text); font-family: inherit;
    text-align: left; transition: all 0.25s; line-height: 1.5;
    display: flex; align-items: flex-start; gap: 12px;
  }
  .quiz-opt:hover:not(.disabled) { border-color: var(--warm); background: var(--warm-glow); }
  .quiz-opt .opt-letter {
    font-family: 'JetBrains Mono', monospace; font-weight: 700;
    font-size: 13px; min-width: 24px; height: 24px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 6px; background: var(--surface3); flex-shrink: 0;
  }
  .quiz-opt.correct { border-color: var(--accent) !important; background: var(--accent-glow) !important; }
  .quiz-opt.correct .opt-letter { background: var(--accent); color: var(--bg); }
  .quiz-opt.wrong { border-color: var(--coral) !important; background: var(--coral-glow) !important; }
  .quiz-opt.wrong .opt-letter { background: var(--coral); color: var(--bg); }
  .quiz-opt.disabled { cursor: default; opacity: 0.6; }
  .quiz-opt.disabled.correct { opacity: 1; }
  .quiz-feedback {
    padding: 16px; border-radius: 10px; margin-top: 14px;
    font-size: 14px; line-height: 1.7; display: none;
  }
  .quiz-feedback.show { display: block; animation: fadeUp 0.3s ease; }
  .quiz-feedback.correct-fb { background: var(--accent-glow); border: 1px solid rgba(110, 231, 183, 0.2); }
  .quiz-feedback.wrong-fb { background: var(--coral-glow); border: 1px solid rgba(251, 113, 133, 0.2); }

  /* SLIDER INTERACTIVE */
  .slider-interactive {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 28px; margin: 24px 0;
  }
  .slider-interactive h3 {
    font-family: 'JetBrains Mono', monospace; font-size: 14px;
    color: var(--purple); margin-bottom: 6px; letter-spacing: 1px;
  }
  .slider-interactive p { font-size: 14px; color: var(--text-dim); margin-bottom: 18px; }
  .slider-row { display: flex; align-items: center; gap: 14px; margin-bottom: 14px; }
  .slider-label {
    font-family: 'JetBrains Mono', monospace; font-size: 12px;
    color: var(--text-dim); min-width: 130px;
  }
  .slider-row input[type="range"] {
    flex: 1; appearance: none; height: 6px;
    background: var(--surface3); border-radius: 3px; cursor: pointer;
  }
  .slider-row input[type="range"]::-webkit-slider-thumb {
    appearance: none; width: 18px; height: 18px;
    background: var(--purple); border-radius: 50%; cursor: pointer;
  }
  .slider-val {
    font-family: 'JetBrains Mono', monospace; font-size: 13px;
    color: var(--purple); min-width: 50px; text-align: right;
  }
  .slider-result {
    background: var(--surface2); border-radius: 10px; padding: 16px;
    margin-top: 14px; font-size: 14px; line-height: 1.7; color: var(--text-dim);
  }

  /* TABS */
  .tab-group { display: flex; gap: 4px; margin-bottom: 20px; background: var(--surface2); border-radius: 10px; padding: 4px; }
  .tab-btn {
    flex: 1; padding: 10px 16px; border: none; background: transparent;
    color: var(--text-dim); font-family: 'JetBrains Mono', monospace;
    font-size: 12px; cursor: pointer; border-radius: 8px; transition: all 0.2s;
    letter-spacing: 0.5px;
  }
  .tab-btn.active { background: var(--surface3); color: var(--text); }
  .tab-content { display: none; }
  .tab-content.active { display: block; animation: fadeUp 0.3s ease; }

  /* BUTTONS */
  .btn-row { display: flex; gap: 12px; margin-top: 32px; flex-wrap: wrap; }
  .btn {
    padding: 12px 24px; border-radius: 10px; border: 1px solid var(--border);
    background: var(--surface2); color: var(--text); font-family: inherit;
    font-size: 14px; cursor: pointer; transition: all 0.3s; font-weight: 600;
  }
  .btn:hover { border-color: var(--accent); }
  .btn-primary { background: var(--accent); color: var(--bg); border-color: var(--accent); }
  .btn-primary:hover { box-shadow: 0 4px 20px var(--accent-glow); transform: translateY(-1px); }

  /* SUMMARY */
  .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 16px; margin: 20px 0; }
  .summary-card {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 12px; padding: 20px; transition: border-color 0.3s;
  }
  .summary-card:hover { border-color: var(--accent); }
  .summary-card h4 { font-size: 15px; margin-bottom: 8px; }
  .summary-card p { font-size: 13px; color: var(--text-dim); line-height: 1.6; }

  /* COMPARISON TABLE */
  .comp-table {
    width: 100%; border-collapse: collapse; margin: 16px 0;
    font-size: 14px;
  }
  .comp-table th {
    font-family: 'JetBrains Mono', monospace; font-size: 12px;
    text-transform: uppercase; letter-spacing: 1px; text-align: left;
    padding: 12px 16px; border-bottom: 2px solid var(--border);
    color: var(--text-dim);
  }
  .comp-table td {
    padding: 12px 16px; border-bottom: 1px solid var(--border);
    color: var(--text-dim); line-height: 1.6;
  }
  .comp-table tr:hover td { background: var(--surface2); }

  /* SCORE DISPLAY */
  .final-score {
    text-align: center; padding: 40px;
    background: linear-gradient(135deg, var(--accent-glow), var(--blue-glow));
    border-radius: 20px; margin: 30px 0;
  }
  .final-score .big-num {
    font-family: 'Playfair Display', serif; font-size: 72px;
    font-weight: 900; color: var(--accent);
  }
  .final-score p { color: var(--text-dim); margin-top: 8px; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 640px) {
    main { padding-left: 14px; padding-right: 14px; }
    .card, .quiz-container, .whatif-container, .slider-interactive { padding: 20px; }
    .section-title { font-size: 22px; }
    .slider-row { flex-wrap: wrap; }
    .slider-label { min-width: 100%; }
  }
</style>
</head>
<body>
<div class="grain"></div>

<nav>
  <div class="nav-brand">PIPELINE<span>.tutor</span></div>
  <div class="nav-progress" id="navProgress"></div>
  <div class="nav-score" id="navScore">Score: 0</div>
</nav>

<main id="app"></main>

<script>
// ====== STATE ======
let currentSection = 0;
let score = 0;
let completedSections = new Set();
const totalSections = 7; // 0=hero, 1-6=topics, 7=final

// ====== CONTENT DATA ======
const sections = [
  // ===== 1: SERVER RENDERING PIPELINES =====
  {
    num: 1,
    title: "Server Rendering Pipelines",
    subtitle: "How data flows from request to response — and how ML inference pipelines mirror this exactly",
    color: "accent",
    content: `
      <div class="card">
        <h3><span class="tag-web">●</span> CORE CONCEPT</h3>
        <p>A <strong>server rendering pipeline</strong> is the full chain of operations that transforms a user's HTTP request into a fully-rendered HTML page delivered to their browser. Instead of sending a blank HTML shell and having the browser build everything (client-side rendering), the server does the heavy lifting.</p>
        <p>The pipeline typically follows: <strong>Request → Route matching → Data fetching → Template/Component rendering → HTML serialization → Response</strong>. Each step transforms data, and the output of one step feeds into the next — exactly like a data pipeline.</p>
        <p>Frameworks like Next.js, Nuxt, and Remix implement this as a series of composable stages. Understanding these stages gives you architectural vocabulary that directly transfers to ML systems.</p>
      </div>

      <div class="card">
        <h3><span class="tag-web">●</span> THE STAGES IN DEPTH</h3>
        <div class="diagram-box"><span class="hl-cyan">REQUEST</span> arrives at edge/server
    │
    ▼
<span class="hl-accent">ROUTE MATCH</span> — Map URL to handler (like routing input to correct model)
    │
    ▼
<span class="hl-warm">DATA FETCH</span> — Pull from DB, API, cache (like feature retrieval)
    │
    ▼
<span class="hl-purple">RENDER</span> — Build component tree → HTML string (like forward pass)
    │
    ▼
<span class="hl-coral">SERIALIZE</span> — Convert to byte stream (like output encoding)
    │
    ▼
<span class="hl-blue">RESPONSE</span> — Send to client with headers</div>
        <p>Each stage can <strong>fail independently</strong>, can be <strong>cached independently</strong>, and can be <strong>parallelized</strong>. This modularity is the key architectural insight.</p>
      </div>

      <div class="analogy">
        <h4>WEB → ML PARALLEL</h4>
        <p>A server rendering pipeline is structurally identical to an <strong>ML inference pipeline</strong>. In ML: <em>Raw input → Preprocessing → Feature extraction → Model inference → Postprocessing → Output formatting</em>. Both are directed acyclic graphs (DAGs) of transformations. Both need to handle latency at each stage. Both benefit from caching intermediate results. In ML serving frameworks like TFServing, Triton, or BentoML, you compose "runners" into a pipeline — just like composing middleware and handlers in Express or Next.js.</p>
      </div>

      <div class="card">
        <h3><span class="tag-ml">●</span> ML DEEP DIVE: INFERENCE PIPELINES</h3>
        <p>In production ML, you rarely call a model directly. Instead you build a <strong>serving pipeline</strong>:</p>
        <ul>
          <li><strong>Input validation</strong> — Schema checks, type coercion (like request parsing)</li>
          <li><strong>Feature engineering</strong> — Tokenization, normalization, embedding lookups (like data fetching)</li>
          <li><strong>Batching</strong> — Group requests for GPU efficiency (like request coalescing)</li>
          <li><strong>Inference</strong> — The actual forward pass (like rendering)</li>
          <li><strong>Post-processing</strong> — Decode tokens, apply thresholds, format response (like serialization)</li>
        </ul>
        <p>Frameworks like <strong>Triton Inference Server</strong> let you chain models in a DAG — model A's output feeds into model B. This is exactly like nested server components in React.</p>
      </div>

      <div class="code-block"><span class="comment">// Web: Next.js server rendering pipeline</span>
<span class="keyword">export async function</span> <span class="fn">getServerSideProps</span>(context) {
  <span class="keyword">const</span> user = <span class="keyword">await</span> <span class="fn">fetchUser</span>(context.params.id);  <span class="comment">// data fetch</span>
  <span class="keyword">const</span> posts = <span class="keyword">await</span> <span class="fn">fetchPosts</span>(user.id);       <span class="comment">// dependent fetch</span>
  <span class="keyword">return</span> { props: { user, posts } };              <span class="comment">// → render stage</span>
}

<span class="comment">// ML: Equivalent inference pipeline (pseudo-code)</span>
<span class="keyword">class</span> <span class="type">InferencePipeline</span>:
    <span class="keyword">def</span> <span class="fn">__call__</span>(self, raw_input):
        features = self.preprocessor(raw_input)    <span class="comment"># feature extraction</span>
        embeddings = self.encoder(features)        <span class="comment"># dependent computation</span>
        prediction = self.model(embeddings)        <span class="comment"># forward pass = "render"</span>
        <span class="keyword">return</span> self.postprocess(prediction)         <span class="comment"># format output</span></div>
    `,
    whatifs: [
      {
        scenario: "You're building an ML service that takes a user photo, detects faces, then classifies emotions on each face. The face detection takes 200ms and emotion classification takes 100ms per face. A photo has 3 faces. What architecture would minimize total latency?",
        options: [
          "Run face detection, then classify emotions sequentially for each face (200 + 300 = 500ms)",
          "Run face detection, then classify all 3 faces in parallel (200 + 100 = 300ms)",
          "Run face detection and emotion classification simultaneously on the full image",
          "Skip face detection and run emotion classification on the whole image"
        ],
        correct: 1,
        explanation: "This is exactly like server rendering with parallel data fetches. The face detection is a blocking prerequisite (like route matching), but the per-face classifications are independent — so you parallelize them. In Next.js, this is like fetching user data first, then fetching their posts, comments, and preferences in parallel via Promise.all(). In ML, you'd use batch inference or concurrent model calls on the detected face crops."
      }
    ],
    quiz: [
      {
        q: "Which web rendering concept most directly parallels the 'forward pass' in neural network inference?",
        opts: ["Route matching", "Data fetching from database", "Component tree rendering to HTML", "HTTP response compression"],
        correct: 2,
        explanation: "Component rendering (transforming a tree of components + data into HTML) is the direct parallel to a forward pass (transforming input features through layers into output). Both take structured input and produce structured output through a series of deterministic transformations."
      },
      {
        q: "In an ML inference pipeline, 'batching' multiple requests together for GPU efficiency most closely resembles which web server technique?",
        opts: ["Server-side rendering", "Request coalescing / DataLoader pattern", "CSS minification", "DNS resolution"],
        correct: 1,
        explanation: "Request coalescing (e.g., Facebook's DataLoader) groups multiple individual data requests into a single batch query, just as ML batching groups multiple inference requests to maximize GPU utilization. Both sacrifice individual request latency slightly to dramatically improve throughput."

// ====== INTERACTION HANDLERS ======
function goToSection(idx) {
  currentSection = idx;
  const app = document.getElementById('app');
  if (idx === 0) {
    app.innerHTML = renderHero();
  } else if (idx <= 6) {
    app.innerHTML = renderSection(idx - 1);
  }
  renderNav();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function completeAndNext(currentIdx, nextIdx) {
  completedSections.add(currentIdx);
  goToSection(nextIdx);
}

function showFinalSummary() {
  completedSections.add(6);
  currentSection = 7;
  document.getElementById('app').innerHTML = renderFinalSummary();
  renderNav();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function resetAll() {
  score = 0;
  completedSections.clear();
  answeredQuizzes = {};
  answeredWhatIfs = {};
  goToSection(0);
}

function switchTab(btn, tabId) {
  const parent = btn.closest('.section');
  parent.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  parent.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById(tabId).classList.add('active');
}

let answeredQuizzes = {};
function answerQuiz(sIdx, qIdx, optIdx, correctIdx) {
  const key = `${sIdx}-${qIdx}`;
  if (answeredQuizzes[key]) return;
  answeredQuizzes[key] = true;

  const opts = document.querySelectorAll(`#quiz-${sIdx}-${qIdx} .quiz-opt`);
  opts.forEach((o, i) => {
    o.classList.add('disabled');
    if (i === correctIdx) o.classList.add('correct');
    if (i === optIdx && i !== correctIdx) o.classList.add('wrong');
  });

  const fb = document.getElementById(`qfb-${sIdx}-${qIdx}`);
  fb.classList.add('show');
  if (optIdx === correctIdx) {
    fb.classList.add('correct-fb');
    score += 10;
  } else {
    fb.classList.add('wrong-fb');
  }
  renderNav();
}

let answeredWhatIfs = {};
function answerWhatIf(sIdx, wIdx, optIdx, correctIdx) {
  const key = `${sIdx}-${wIdx}`;
  if (answeredWhatIfs[key]) return;
  answeredWhatIfs[key] = true;

  const btns = document.querySelectorAll(`#whatif-${sIdx}-${wIdx} .whatif-btn`);
  btns.forEach((b, i) => {
    if (i === correctIdx) b.classList.add('correct');
    if (i === optIdx && i !== correctIdx) b.classList.add('wrong');
    b.style.pointerEvents = 'none';
  });

  const fb = document.getElementById(`wfb-${sIdx}-${wIdx}`);
  fb.classList.add('show');
  if (optIdx === correctIdx) {
    score += 10;
  }
  renderNav();
}
